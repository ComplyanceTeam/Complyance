version: '3.8'

services:
  backend:
    build: 
      context: ./backend/backend_process_alone
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_outputs:/app/outputs
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Map 5173 to Nginx 80 so user doesn't have to change their URL
    depends_on:
      - backend
    restart: unless-stopped
    environment:
      # If deploying to production, change this to the production domain
      - VITE_API_BASE_URL=http://localhost:8000/api

volumes:
  backend_outputs:
