version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: complyance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: complyance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: complyance_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/complyance"
    ports:
      - "3001:3001"
    volumes:
      - ./core:/app/core
      - ./services/api:/app/services/api

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: complyance_frontend
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
