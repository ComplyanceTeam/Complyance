services:
  # ─── BACKEND (FastAPI + ML Pipeline) ─────────────────────────
  - type: web
    name: transcoder-backend
    runtime: python
    buildCommand: |
      cd backend/backend_process_alone
      pip install --no-cache-dir -r requirments.txt
    startCommand: |
      cd backend/backend_process_alone
      uvicorn server:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000

  # ─── FRONTEND (React + Vite) ─────────────────────────────────
  - type: web
    name: transcoder-frontend
    runtime: static
    buildCommand: |
      cd frontend
      npm install
      npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      # This dynamically maps the live backend URL to the frontend environment at build time
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: transcoder-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # React Router fallback to handle SPA refresh routing gracefully
      - type: rewrite
        source: /*
        destination: /index.html
